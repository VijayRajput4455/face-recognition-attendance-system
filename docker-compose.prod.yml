version: "3.9"

# ==========================================================
# PRODUCTION CONFIGURATION
#
# This file extends docker-compose.yml.
#
# Usage:
#
# docker compose \
#   -f docker-compose.yml \
#   -f docker-compose.prod.yml \
#   up -d
#
# ==========================================================

services:

  # ========================================================
  # FastAPI API
  # ========================================================
  api:

    # Expose API
    ports:
      - "8000:8000"

    # Restart automatically
    restart: always

    # Prevent privilege escalation
    security_opt:
      - no-new-privileges:true

    # Rotate Docker logs
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # ========================================================
  # Enrollment Worker
  # ========================================================
  worker:

    restart: always

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # ========================================================
  # PostgreSQL
  # ========================================================
  postgres:

    restart: always

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # ========================================================
  # RabbitMQ
  # ========================================================
  rabbitmq:

    # RabbitMQ Broker
    ports:
      - "5672:5672"

      # RabbitMQ Management UI
      - "15672:15672"

    restart: always

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # ========================================================
  # ETCD
  # ========================================================
  etcd:

    restart: always

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # ========================================================
  # MinIO
  # ========================================================
  minio:

    ports:
      - "9000:9000"

    restart: always

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # ========================================================
  # Milvus
  # ========================================================
  milvus:

    ports:
      - "19530:19530"

      # Monitoring
      - "9091:9091"

    restart: always

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"