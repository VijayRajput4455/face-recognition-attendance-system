version: "3.9"

# ==========================================================
# FACE RECOGNITION SYSTEM
#
# Base Docker Compose Configuration
#
# This file contains only the common configuration shared
# between Development and Production.
#
# Development:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Production:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ==========================================================

services:

  # ========================================================
  # FastAPI Application
  # ========================================================

  api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: face-recognition-api

    env_file:
      - .env

    environment:

      # Override localhost values inside Docker
      POSTGRES_HOST: postgres

      RABBITMQ_HOST: rabbitmq

      MILVUS_URI: http://milvus:19530

      INSIGHTFACE_GPU_ID: -1

    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000

    depends_on:

      postgres:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

      milvus:
        condition: service_started

    networks:
      - face-network

  # ========================================================
  # Enrollment Worker
  #
  # Consumes RabbitMQ messages
  # Extracts frames
  # Generates embeddings
  # Stores vectors in Milvus
  # ========================================================

  worker:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: enrollment-worker

    command:
      - python
      - -m
      - app.workers.enrollment_worker

    env_file:
      - .env

    environment:

      POSTGRES_HOST: postgres

      RABBITMQ_HOST: rabbitmq

      MILVUS_URI: http://milvus:19530

      INSIGHTFACE_GPU_ID: -1

    depends_on:

      rabbitmq:
        condition: service_healthy

      postgres:
        condition: service_healthy

      milvus:
        condition: service_started

    networks:
      - face-network

  # ========================================================
  # PostgreSQL
  # ========================================================

  postgres:

    image: postgres:16

    container_name: postgres

    environment:

      POSTGRES_DB: ${POSTGRES_DB}

      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER}"
        ]

      interval: 10s

      timeout: 5s

      retries: 5

    networks:
      - face-network

  # ========================================================
  # RabbitMQ
  # ========================================================

  rabbitmq:

    image: rabbitmq:3-management

    container_name: rabbitmq

    environment:

      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}

      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

    volumes:

      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:

      test:
        [
          "CMD",
          "rabbitmq-diagnostics",
          "ping"
        ]

      interval: 10s

      timeout: 5s

      retries: 5

    networks:
      - face-network

  # ========================================================
  # ETCD
  # ========================================================

  etcd:

    image: quay.io/coreos/etcd:v3.5.5

    container_name: milvus-etcd

    command: >

      etcd

      --advertise-client-urls=http://0.0.0.0:2379

      --listen-client-urls=http://0.0.0.0:2379

      --data-dir=/etcd

    environment:

      ETCD_AUTO_COMPACTION_MODE: revision

      ETCD_AUTO_COMPACTION_RETENTION: "1000"

      ETCD_QUOTA_BACKEND_BYTES: "4294967296"

    volumes:

      - etcd_data:/etcd

    networks:
      - face-network

  # ========================================================
  # MinIO
  # ========================================================

  minio:

    image: minio/minio:RELEASE.2023-03-20T20-16-18Z

    container_name: milvus-minio

    command: server /data

    environment:

      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}

      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

    volumes:

      - minio_data:/data

    networks:
      - face-network

  # ========================================================
  # Milvus
  # ========================================================

  milvus:

    image: milvusdb/milvus:v2.4.4

    container_name: milvus-standalone

    command:

      - milvus

      - run

      - standalone

    environment:

      ETCD_ENDPOINTS: etcd:2379

      MINIO_ADDRESS: minio:9000

    depends_on:

      - etcd

      - minio

    volumes:

      - milvus_data:/var/lib/milvus

    networks:
      - face-network

# ==========================================================
# Persistent Volumes
# ==========================================================

volumes:

  postgres_data:

  rabbitmq_data:

  etcd_data:

  minio_data:

  milvus_data:

# ==========================================================
# Docker Network
# ==========================================================

networks:

  face-network:

    driver: bridge